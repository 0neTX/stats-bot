services:
  bot:
    build: .
    image: ghcr.io/0netx/stats-bot:local
    container_name: stats-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    # Hardening
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Servicio de inicialización (ejecutar una sola vez con: docker compose run --rm init)
  # El profile "init" evita que se arranque con un "docker compose up" normal.
  init:
    build: .
    image: ghcr.io/0netx/stats-bot:local
    container_name: stats-bot-init
    profiles: ["init"]
    stdin_open: true
    tty: true
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    # Hardening
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: ["python", "/app/src/init_historial.py"]

volumes:
  stats_data:

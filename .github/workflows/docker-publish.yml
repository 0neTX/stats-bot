name: Build and Publish Docker Image

on:
  push:
    branches: [main]

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: 0netx/stats-bot

jobs:
  build-push-clean:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Consulta las versiones existentes en GHCR y calcula el siguiente número
      - name: Determine next version
        id: version
        run: |
          RESPONSE=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/0netx/packages/container/stats-bot/versions?per_page=100" \
            2>/dev/null || echo "[]")

          MAX=$(echo "$RESPONSE" \
            | jq -r '[.[] | .metadata.container.tags[] | select(test("^v[0-9]+$")) | ltrimstr("v") | tonumber] | max // 0')

          NEXT=$(( MAX + 1 ))
          echo "tag=v${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Next version: v${NEXT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # Obtiene todas las versiones con tag vN, las ordena ascendente por número
      # y elimina las más antiguas conservando solo las 5 últimas
      - name: Delete old versions (keep last 5)
        run: |
          VERSIONS=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/0netx/packages/container/stats-bot/versions?per_page=100" \
            | jq -r '
              .[]
              | select(.metadata.container.tags | map(test("^v[0-9]+$")) | any)
              | [
                  (.metadata.container.tags[] | select(test("^v[0-9]+$")) | ltrimstr("v") | tonumber),
                  .id
                ]
              | @tsv
            ' \
            | sort -n \
            | head -n -5 \
            | awk '{print $2}')

          if [ -z "$VERSIONS" ]; then
            echo "No hay versiones antiguas que eliminar."
            exit 0
          fi

          for ID in $VERSIONS; do
            echo "Eliminando versión ID: $ID"
            curl -sf -X DELETE \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/users/0netx/packages/container/stats-bot/versions/$ID" \
              && echo "  ✓ Eliminada" || echo "  ✗ Error al eliminar $ID"
          done
